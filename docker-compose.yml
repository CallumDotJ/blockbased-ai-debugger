services:
  api:
    build:
      context: ./uniProjectApi
      dockerfile: Dockerfile
    container_name: blockApi
    env_file:
      - ./uniProjectApi/server/.env
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000

    command: ["node", "server/index.js"]

  frontend:
    build:
      context: ./blockDebugger
      dockerfile: Dockerfile
    container_name: blockFrontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api
